version: '3.9'

services:
  api:
    build:
      context: .
      target: build
    container_name: interview_lab_api
    ports:
      - '3000:3000'
    environment:
      - NODE_ENV=development
      - DATABASE_URI=mongodb://admin:dev_password_27017@mongodb:27017/interview_lab?authSource=admin
      - JWT_SECRET=local_dev_jwt_secret_replace_in_production
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - ./src:/usr/src/app/src
    depends_on:
      - mongodb
    command: npm run start:dev

  mongodb:
    image: mongo:7.0
    container_name: interview_lab_mongodb
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongodb_data:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=admin
      - MONGO_INITDB_ROOT_PASSWORD=dev_password_27017
      - MONGO_INITDB_DATABASE=interview_lab

volumes:
  mongodb_data:
