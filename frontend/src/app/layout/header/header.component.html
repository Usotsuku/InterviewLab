<header class="il-header">
  <div class="flex items-center gap-3">
    <h6 class="text-sm font-semibold text-text-secondary tracking-tight">InterviewLab</h6>
  </div>
  <div class="flex items-center gap-1">
    <button
      class="il-header-btn"
      (click)="themeService.toggleTheme()"
      [attr.aria-label]="themeService.isDark() ? 'Switch to light mode' : 'Switch to dark mode'"
    >
      <mat-icon class="text-xl" aria-hidden="true">{{ themeService.isDark() ? 'light_mode' : 'dark_mode' }}</mat-icon>
    </button>

    <button class="il-header-btn" aria-label="Notifications">
      <mat-icon class="text-xl" aria-hidden="true">notifications_none</mat-icon>
    </button>

    <button class="il-header-btn" [matMenuTriggerFor]="userMenu" aria-label="User menu">
      <il-avatar [name]="authStore.user()?.name ?? 'U'" size="sm" />
    </button>
    <mat-menu #userMenu="matMenu" class="il-menu">
      <button mat-menu-item (click)="onLogout()">
        <mat-icon aria-hidden="true">logout</mat-icon>
        <span>Logout</span>
      </button>
    </mat-menu>
  </div>
</header>
