<div class="flex flex-col items-center justify-center py-16 px-8 text-center">
  <div class="w-16 h-16 rounded-2xl bg-surface-2 flex items-center justify-center mb-5">
    <mat-icon class="text-3xl w-8 h-8 text-text-muted" aria-hidden="true">{{ icon() }}</mat-icon>
  </div>
  <h4 class="text-lg font-semibold text-text mb-2">{{ title() }}</h4>
  @if (description()) {
    <p class="text-sm text-text-secondary max-w-sm mb-6 leading-relaxed">{{ description() }}</p>
  }
  @if (actionLabel()) {
    <div class="flex flex-wrap items-center justify-center gap-3">
      <il-button
        (clicked)="actionClick.emit()"
        size="md"
        [attr.aria-label]="actionLabel()"
      >{{ actionLabel() }}</il-button>
      @if (secondaryActionLabel()) {
        <il-button
          variant="secondary"
          (clicked)="secondaryActionClick.emit()"
          size="md"
          [attr.aria-label]="secondaryActionLabel()"
        >{{ secondaryActionLabel() }}</il-button>
      }
    </div>
  }
</div>
