<div class="flex flex-col sm:flex-row sm:items-center gap-3">
  <div class="relative flex-1">
    <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-neutral-400 text-base w-4 h-4" aria-hidden="true">search</mat-icon>
    <input
      type="text"
      class="w-full pl-9 pr-3 py-2 text-sm rounded-lg border border-neutral-200 bg-white text-neutral-800 placeholder:text-neutral-400 focus:outline-none focus:ring-2 focus:ring-primary-200 focus:border-primary-300 transition-colors duration-150"
      placeholder="Search interviews..."
      [value]="search()"
      (input)="onSearchInput($event)"
      aria-label="Search interviews"
    />
  </div>

  <div class="flex items-center gap-2">
    @for (f of filters; track f.value) {
      <button
        class="px-3 py-1.5 text-xs font-medium rounded-lg transition-colors duration-150"
        [class]="filter() === f.value
          ? 'bg-primary-50 text-primary-600 border border-primary-200'
          : 'bg-white text-neutral-500 border border-neutral-200 hover:bg-neutral-50'"
        (click)="onFilterChange(f.value)"
        [attr.aria-pressed]="filter() === f.value"
      >
        {{ f.label }}
      </button>
    }
  </div>

  <il-button
    variant="ghost"
    size="sm"
    [icon]="sortOrder() === 'desc' ? 'arrow_downward' : 'arrow_upward'"
    (clicked)="onSortToggle()"
    [attr.aria-label]="'Sort by ' + (sortBy() === 'createdAt' ? 'date' : sortBy()) + ' ' + sortOrder()"
  >
    {{ sortBy() === 'createdAt' ? 'Date' : sortBy() === 'overallScore' ? 'Score' : 'Name' }}
  </il-button>
</div>
