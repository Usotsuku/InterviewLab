<div class="flex flex-col sm:flex-row sm:items-center gap-3">
  <div class="relative flex-1">
    <mat-icon class="absolute left-3 top-1/2 -translate-y-1/2 text-text-muted text-base w-4 h-4" aria-hidden="true">search</mat-icon>
    <input
      type="text"
      class="w-full pl-9 pr-3 py-2.5 text-sm rounded-xl border border-border bg-surface-1/60 backdrop-blur-sm text-text placeholder:text-text-muted focus:outline-none focus:ring-2 focus:ring-primary-200/40 focus:border-primary-300 transition-all duration-200"
      placeholder="Search interviews..."
      [value]="search()"
      (input)="onSearchInput($event)"
      aria-label="Search interviews"
    />
  </div>

  <div class="flex items-center gap-1.5" role="group" aria-label="Filter by status">
    @for (f of filters; track f.value) {
      <button
        class="px-3.5 py-1.5 text-xs font-medium rounded-full transition-all duration-200"
        [class]="filter() === f.value
          ? 'bg-primary-50 text-primary-600 shadow-sm'
          : 'bg-surface-2 text-text-muted hover:text-text-secondary hover:bg-surface-3'"
        (click)="onFilterChange(f.value)"
        [attr.aria-pressed]="filter() === f.value"
      >
        {{ f.label }}
      </button>
    }
  </div>

  <il-button
    variant="ghost"
    size="sm"
    [icon]="sortOrder() === 'desc' ? 'arrow_downward' : 'arrow_upward'"
    (clicked)="onSortToggle()"
    [attr.aria-label]="'Sort by ' + (sortBy() === 'createdAt' ? 'date' : sortBy()) + ' ' + sortOrder()"
  >
    {{ sortBy() === 'createdAt' ? 'Date' : sortBy() === 'overallScore' ? 'Score' : 'Name' }}
  </il-button>
</div>
