<il-card [routerLink]="['/history', interview().id]" class="block cursor-pointer hover:border-neutral-300 transition-colors duration-150">
  <div class="flex items-start justify-between gap-4">
    <div class="flex-1 min-w-0">
      <div class="flex items-center gap-2 mb-2">
        <il-interview-status-badge [status]="interview().status" />
        <span class="inline-flex items-center gap-1 text-xs text-neutral-400">
          <mat-icon class="text-xs w-3.5 h-3.5" aria-hidden="true">{{ modeIcon() }}</mat-icon>
          {{ interview().mode }}
        </span>
      </div>
      <h4 class="text-sm font-semibold text-neutral-800 truncate mb-1">
        {{ interview().title || 'Untitled Interview' }}
      </h4>
      <p class="text-xs text-neutral-400">
        {{ formattedDate() }} &middot; {{ interview().totalQuestions }} questions
      </p>
    </div>

    <div class="flex items-center gap-3 shrink-0">
      @if (interview().overallScore != null) {
        <div class="text-right">
          <p class="text-lg font-bold text-primary-500 m-0">{{ interview().overallScore }}</p>
          <p class="text-[10px] text-neutral-400 m-0">Score</p>
        </div>
      }
      <il-button
        variant="ghost"
        size="sm"
        icon="delete_outline"
        (clicked)="onDelete($event)"
        aria-label="Delete interview"
      />
    </div>
  </div>
</il-card>
