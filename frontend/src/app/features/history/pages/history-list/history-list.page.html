<section class="space-y-8">
  <header class="il-fade-in-up">
    <h1 class="text-2xl font-bold text-text tracking-tight">Interview History</h1>
    <p class="text-sm text-text-secondary mt-1">Review all your past interview sessions and results.</p>
  </header>

  @if (store.loading()) {
    <div class="flex items-center justify-center py-24">
      <il-spinner label="Loading interviews..." />
    </div>
  } @else if (store.error()) {
    <div class="il-fade-in-up il-alert--error py-4 px-5" role="alert">
      <mat-icon class="text-base w-4 h-4" aria-hidden="true">error_outline</mat-icon>
      <p class="text-sm">{{ store.error() }}</p>
    </div>
  } @else {
    <div class="il-fade-in-up" style="animation-delay: 0.05s">
      <il-interview-history-filters
        [filter]="store.filter()"
        [sortBy]="store.sortBy()"
        [sortOrder]="store.sortOrder()"
        [search]="store.search()"
        (filterChange)="onFilterChange($event)"
        (sortChange)="onSortChange($event)"
        (searchChange)="onSearchChange($event)"
      />
    </div>

    <div class="il-fade-in-up" style="animation-delay: 0.1s">
      <il-interview-history-list
        [interviews]="store.filteredItems()"
        [isEmpty]="store.isEmpty()"
        (deleteInterview)="onDeleteInterview($event)"
        (startInterview)="onStartInterview()"
      />
    </div>
  }
</section>
