<section class="space-y-6">
  <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h1 class="text-2xl font-bold text-neutral-800 m-0">Settings</h1>
      <p class="text-sm text-neutral-400 m-0 mt-1">Manage your application preferences and account.</p>
    </div>
    <il-button variant="secondary" size="md" icon="logout" (clicked)="onLogout()">
      Logout
    </il-button>
  </header>

  <il-account-section
    [userName]="store.userName()"
    [userEmail]="store.userEmail()"
    [userId]="store.userId()"
    [createdAt]="store.userCreatedAt()"
  />

  <il-appearance-section
    [theme]="store.theme()"
    [language]="store.language()"
    (themeChange)="onThemeChange($event)"
    (languageChange)="onLanguageChange($event)"
  />

  <il-notification-section
    [notificationsEnabled]="store.notificationsEnabled()"
    [interviewReminders]="store.interviewReminders()"
    (notificationsChange)="onNotificationsChange($event)"
    (remindersChange)="onRemindersChange($event)"
  />

  <il-device-section
    [micEnabled]="store.micEnabled()"
    [autoTranscribe]="store.autoTranscribe()"
    (micChange)="onMicChange($event)"
    (autoTranscribeChange)="onAutoTranscribeChange($event)"
  />

  <il-password-section
    [isLoading]="store.isChangingPassword()"
    [error]="store.getError('password')"
    (passwordChange)="onPasswordChange($event)"
  />

  <il-about-section />

  <il-delete-account-section
    [isLoading]="store.isDeleting()"
    (deleteClick)="onDeleteAccount()"
  />
</section>
