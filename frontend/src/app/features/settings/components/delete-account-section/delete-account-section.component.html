<il-card>
  <div class="il-alert--error border border-danger-100 rounded-xl p-5">
    <div class="flex items-start gap-4">
      <mat-icon class="text-lg w-5 h-5 text-danger-500 mt-0.5 flex-shrink-0" aria-hidden="true">warning</mat-icon>
      <div class="flex-1">
        <h4 class="text-sm font-semibold text-danger-500 m-0 tracking-tight">Danger Zone</h4>
        <p class="text-sm text-text-muted mt-1.5 m-0 leading-relaxed">
          Permanently delete your account and all associated data. This action cannot be undone.
        </p>

        @if (!showConfirm) {
          <div class="mt-4">
            <il-button
              variant="danger"
              size="sm"
              icon="delete_forever"
              (clicked)="onToggleConfirm()"
            >Delete Account</il-button>
          </div>
        } @else {
          <div class="il-alert--error mt-4 p-4 bg-danger-50 rounded-xl border border-danger-100">
            <p class="text-sm text-danger-600 font-medium m-0 mb-3">
              Are you sure? This will permanently delete your account.
            </p>
            <div class="flex items-center gap-3">
              <il-button
                variant="danger"
                size="sm"
                [loading]="isLoading()"
                [disabled]="isLoading()"
                (clicked)="onConfirmDelete()"
              >Yes, Delete Account</il-button>
              <il-button
                variant="ghost"
                size="sm"
                [disabled]="isLoading()"
                (clicked)="onToggleConfirm()"
              >Cancel</il-button>
            </div>
          </div>
        }
      </div>
    </div>
  </div>
</il-card>
