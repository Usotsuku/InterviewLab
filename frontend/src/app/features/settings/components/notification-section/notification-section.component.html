<il-card title="Notifications">
  <div class="space-y-1">
    <div class="flex items-center justify-between py-3 border-b border-neutral-200">
      <div>
        <p class="text-sm font-medium text-neutral-600 m-0">Enable Notifications</p>
        <p class="text-xs text-neutral-400 m-0 mt-0.5">Receive in-app notifications for events</p>
      </div>
      <button
        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
        [ngClass]="notificationsEnabled() ? 'bg-primary-500' : 'bg-neutral-300'"
        role="switch"
        [attr.aria-checked]="notificationsEnabled()"
        [attr.aria-label]="'Notifications: ' + (notificationsEnabled() ? 'on' : 'off')"
        (click)="onToggleNotifications()"
      >
        <span
          class="pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow-sm ring-0 transition-transform duration-200 ease-in-out"
          [ngClass]="notificationsEnabled() ? 'translate-x-5' : 'translate-x-0'"
        ></span>
      </button>
    </div>

    <div class="flex items-center justify-between py-3">
      <div>
        <p class="text-sm font-medium text-neutral-600 m-0">Interview Reminders</p>
        <p class="text-xs text-neutral-400 m-0 mt-0.5">Get reminded before scheduled practice</p>
      </div>
      <button
        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
        [ngClass]="interviewReminders() ? 'bg-primary-500' : 'bg-neutral-300'"
        role="switch"
        [attr.aria-checked]="interviewReminders()"
        [attr.aria-label]="'Interview reminders: ' + (interviewReminders() ? 'on' : 'off')"
        (click)="onToggleReminders()"
      >
        <span
          class="pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow-sm ring-0 transition-transform duration-200 ease-in-out"
          [ngClass]="interviewReminders() ? 'translate-x-5' : 'translate-x-0'"
        ></span>
      </button>
    </div>
  </div>
</il-card>
