<il-card title="Notifications">
  <div class="space-y-1">
    <div class="flex items-center justify-between py-4 border-b border-border">
      <div>
        <p class="text-sm font-medium text-text m-0">Enable Notifications</p>
        <p class="text-xs text-text-muted m-0 mt-1">Receive in-app notifications for events</p>
      </div>
      <button
        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full transition-colors duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
        [ngClass]="notificationsEnabled() ? 'bg-primary-500' : 'bg-surface-3'"
        role="switch"
        [attr.aria-checked]="notificationsEnabled()"
        [attr.aria-label]="'Notifications: ' + (notificationsEnabled() ? 'on' : 'off')"
        (click)="onToggleNotifications()"
      >
        <span
          class="pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow-sm transition-transform duration-300 ease-in-out mt-0.5"
          [ngClass]="notificationsEnabled() ? 'translate-x-5.5 ml-0.5' : 'translate-x-0.5'"
        ></span>
      </button>
    </div>

    <div class="flex items-center justify-between py-4">
      <div>
        <p class="text-sm font-medium text-text m-0">Interview Reminders</p>
        <p class="text-xs text-text-muted m-0 mt-1">Get reminded before scheduled practice</p>
      </div>
      <button
        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full transition-colors duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
        [ngClass]="interviewReminders() ? 'bg-primary-500' : 'bg-surface-3'"
        role="switch"
        [attr.aria-checked]="interviewReminders()"
        [attr.aria-label]="'Interview reminders: ' + (interviewReminders() ? 'on' : 'off')"
        (click)="onToggleReminders()"
      >
        <span
          class="pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow-sm transition-transform duration-300 ease-in-out mt-0.5"
          [ngClass]="interviewReminders() ? 'translate-x-5.5 ml-0.5' : 'translate-x-0.5'"
        ></span>
      </button>
    </div>
  </div>
</il-card>
