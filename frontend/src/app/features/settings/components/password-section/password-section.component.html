<il-card title="Change Password">
  <div class="space-y-5 max-w-md">
    <il-form-error [show]="error() != null" [message]="error() ?? ''" />

    <div>
      <label for="current-password" class="block text-sm font-medium text-text-secondary mb-2">Current Password</label>
      <input
        id="current-password"
        type="password"
        class="w-full px-4 py-2.5 rounded-xl border border-border bg-surface-2 text-sm text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-all duration-200"
        placeholder="Enter current password"
        [(ngModel)]="currentPassword"
        autocomplete="current-password"
        aria-required="true"
      />
      <il-form-error [show]="currentPasswordError.length > 0" [message]="currentPasswordError" />
    </div>

    <div>
      <label for="new-password" class="block text-sm font-medium text-text-secondary mb-2">New Password</label>
      <input
        id="new-password"
        type="password"
        class="w-full px-4 py-2.5 rounded-xl border border-border bg-surface-2 text-sm text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-all duration-200"
        placeholder="Enter new password (min. 8 characters)"
        [(ngModel)]="newPassword"
        autocomplete="new-password"
        aria-required="true"
      />
      <il-form-error [show]="newPasswordError.length > 0" [message]="newPasswordError" />
    </div>

    <div>
      <label for="confirm-password" class="block text-sm font-medium text-text-secondary mb-2">Confirm New Password</label>
      <input
        id="confirm-password"
        type="password"
        class="w-full px-4 py-2.5 rounded-xl border border-border bg-surface-2 text-sm text-text placeholder-text-muted focus:outline-none focus:ring-2 focus:ring-primary-500 focus:border-primary-500 transition-all duration-200"
        placeholder="Confirm new password"
        [(ngModel)]="confirmPassword"
        autocomplete="new-password"
        aria-required="true"
      />
      <il-form-error [show]="confirmPasswordError.length > 0" [message]="confirmPasswordError" />
    </div>

    <div class="pt-3">
      <il-button
        variant="primary"
        size="md"
        [disabled]="!isValid || isLoading()"
        [loading]="isLoading()"
        (clicked)="onSubmit()"
      >Change Password</il-button>
    </div>
  </div>
</il-card>
