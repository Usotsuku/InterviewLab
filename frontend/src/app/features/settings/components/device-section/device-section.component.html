<il-card title="Microphone &amp; Device">
  <div class="space-y-1">
    <div class="flex items-center justify-between py-4 border-b border-border">
      <div>
        <p class="text-sm font-medium text-text m-0">Microphone Access</p>
        <p class="text-xs text-text-muted m-0 mt-1">Allow browser to access your microphone for interviews</p>
      </div>
      <button
        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full transition-colors duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
        [ngClass]="micEnabled() ? 'bg-primary-500' : 'bg-surface-3'"
        role="switch"
        [attr.aria-checked]="micEnabled()"
        [attr.aria-label]="'Microphone access: ' + (micEnabled() ? 'on' : 'off')"
        (click)="onToggleMic()"
      >
        <span
          class="pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow-sm transition-transform duration-300 ease-in-out mt-0.5"
          [ngClass]="micEnabled() ? 'translate-x-5.5 ml-0.5' : 'translate-x-0.5'"
        ></span>
      </button>
    </div>

    <div class="flex items-center justify-between py-4">
      <div>
        <p class="text-sm font-medium text-text m-0">Auto-Transcribe</p>
        <p class="text-xs text-text-muted m-0 mt-1">Automatically transcribe spoken answers during interviews</p>
      </div>
      <button
        class="relative inline-flex h-6 w-11 flex-shrink-0 cursor-pointer rounded-full transition-colors duration-300 ease-in-out focus:outline-none focus:ring-2 focus:ring-primary-500 focus:ring-offset-2"
        [ngClass]="autoTranscribe() ? 'bg-primary-500' : 'bg-surface-3'"
        role="switch"
        [attr.aria-checked]="autoTranscribe()"
        [attr.aria-label]="'Auto-transcribe: ' + (autoTranscribe() ? 'on' : 'off')"
        (click)="onToggleAutoTranscribe()"
      >
        <span
          class="pointer-events-none inline-block h-5 w-5 rounded-full bg-white shadow-sm transition-transform duration-300 ease-in-out mt-0.5"
          [ngClass]="autoTranscribe() ? 'translate-x-5.5 ml-0.5' : 'translate-x-0.5'"
        ></span>
      </button>
    </div>
  </div>
</il-card>
