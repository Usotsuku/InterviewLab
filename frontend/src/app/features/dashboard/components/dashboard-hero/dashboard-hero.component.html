<div class="il-fade-in-up">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-5">
    <div>
      <h1 class="text-2xl font-bold text-text mb-1 tracking-tight">
        Welcome back, <span class="il-gradient-text">{{ userName() }}</span>
      </h1>
      <p class="text-sm text-text-secondary">
        @if (totalInterviews() === 0) {
          Start your first interview to begin tracking your progress.
        } @else {
          You've completed {{ totalInterviews() }} interview{{ totalInterviews() === 1 ? '' : 's' }} with a {{ completionRate() }}% completion rate.
        }
      </p>
    </div>
    <il-button icon="add" routerLink="/interview" size="lg">Start Interview</il-button>
  </div>
</div>
