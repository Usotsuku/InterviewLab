<il-card title="Skill Breakdown">
  <div class="space-y-5">
    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-text-secondary">Communication</span>
        <span class="text-xs font-bold text-text tabular-nums">{{ formatScore(communicationScore()) }}</span>
      </div>
      <il-progress [value]="communicationScore() ?? 0" [variant]="scoreVariant(communicationScore())" [showLabel]="true" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-text-secondary">Technical</span>
        <span class="text-xs font-bold text-text tabular-nums">{{ formatScore(technicalScore()) }}</span>
      </div>
      <il-progress [value]="technicalScore() ?? 0" [variant]="scoreVariant(technicalScore())" [showLabel]="true" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-text-secondary">Confidence</span>
        <span class="text-xs font-bold text-text tabular-nums">{{ formatScore(confidenceScore()) }}</span>
      </div>
      <il-progress [value]="confidenceScore() ?? 0" [variant]="scoreVariant(confidenceScore())" [showLabel]="true" />
    </div>
  </div>
</il-card>
