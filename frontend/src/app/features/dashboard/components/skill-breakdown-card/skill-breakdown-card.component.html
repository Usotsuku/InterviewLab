<il-card title="Skill Breakdown">
  <div class="space-y-4">
    <div>
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-sm text-neutral-500">Communication</span>
        <span class="text-xs font-semibold text-neutral-600">{{ formatScore(communicationScore()) }}</span>
      </div>
      <il-progress [value]="communicationScore() ?? 0" [variant]="scoreVariant(communicationScore())" [showLabel]="true" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-sm text-neutral-500">Technical</span>
        <span class="text-xs font-semibold text-neutral-600">{{ formatScore(technicalScore()) }}</span>
      </div>
      <il-progress [value]="technicalScore() ?? 0" [variant]="scoreVariant(technicalScore())" [showLabel]="true" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-1.5">
        <span class="text-sm text-neutral-500">Confidence</span>
        <span class="text-xs font-semibold text-neutral-600">{{ formatScore(confidenceScore()) }}</span>
      </div>
      <il-progress [value]="confidenceScore() ?? 0" [variant]="scoreVariant(confidenceScore())" [showLabel]="true" />
    </div>
  </div>
</il-card>
