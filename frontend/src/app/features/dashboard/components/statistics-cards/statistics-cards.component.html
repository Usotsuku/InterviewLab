<div class="il-stagger grid grid-cols-2 lg:grid-cols-4 gap-4">
  @for (stat of stats(); track stat.label) {
    <div class="il-card il-card--flat il-card--interactive p-5">
      <div class="flex items-center gap-3.5">
        <div class="flex items-center justify-center w-11 h-11 rounded-xl shadow-sm" [ngClass]="stat.color">
          <mat-icon class="text-xl w-5 h-5 text-white" aria-hidden="true">{{ stat.icon }}</mat-icon>
        </div>
        <div>
          <p class="text-xs text-text-muted m-0 font-medium">{{ stat.label }}</p>
          <p class="text-2xl font-bold text-text m-0 tracking-tight">{{ stat.value }}</p>
        </div>
      </div>
    </div>
  }
</div>
