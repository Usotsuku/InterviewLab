<div class="grid grid-cols-2 lg:grid-cols-4 gap-4">
  @for (stat of stats(); track stat.label) {
    <il-card variant="flat">
      <div class="flex items-center gap-3">
        <div class="flex items-center justify-center w-10 h-10 rounded-lg" [ngClass]="stat.color">
          <mat-icon class="text-lg w-5 h-5 text-white" aria-hidden="true">{{ stat.icon }}</mat-icon>
        </div>
        <div>
          <p class="text-xs text-neutral-400 m-0">{{ stat.label }}</p>
          <p class="text-xl font-bold text-neutral-800 m-0">{{ stat.value }}</p>
        </div>
      </div>
    </il-card>
  }
</div>
