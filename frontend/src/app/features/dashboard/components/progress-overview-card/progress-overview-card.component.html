<il-card title="Progress Overview">
  <div class="space-y-5">
    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-text-secondary">Average Score</span>
        <span class="text-sm font-bold text-text tabular-nums">{{ formatScore(averageScore()) }}</span>
      </div>
      <il-progress [value]="averageScore() ?? 0" [variant]="scoreVariant(averageScore())" [showLabel]="true" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-text-secondary">Confidence</span>
        <span class="text-sm font-bold text-text tabular-nums">{{ formatScore(averageConfidence()) }}</span>
      </div>
      <il-progress [value]="averageConfidence() ?? 0" [variant]="scoreVariant(averageConfidence())" [showLabel]="true" />
    </div>

    <div>
      <div class="flex items-center justify-between mb-2">
        <span class="text-sm text-text-secondary">Completion Rate</span>
        <span class="text-sm font-bold text-text tabular-nums">{{ completionRate() }}%</span>
      </div>
      <il-progress [value]="completionRate()" [variant]="scoreVariant(completionRate())" [showLabel]="true" />
    </div>

    <div class="pt-4 border-t border-border grid grid-cols-2 gap-4">
      <div>
        <p class="text-xs text-text-muted m-0 font-medium mb-1">This Week</p>
        <p class="text-2xl font-bold text-text m-0 tracking-tight">{{ interviewsThisWeek() }}</p>
      </div>
      <div>
        <p class="text-xs text-text-muted m-0 font-medium mb-1">This Month</p>
        <p class="text-2xl font-bold text-text m-0 tracking-tight">{{ interviewsThisMonth() }}</p>
      </div>
    </div>
  </div>
</il-card>
