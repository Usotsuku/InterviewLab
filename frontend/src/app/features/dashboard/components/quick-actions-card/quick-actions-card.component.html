<il-card title="Quick Actions">
  <div class="grid grid-cols-2 gap-3">
    @for (action of actions; track action.route) {
      <a
        [routerLink]="action.route"
        class="il-quick-action"
      >
        <div class="il-quick-action-icon" [ngClass]="action.color">
          <mat-icon class="text-white text-lg w-5 h-5" aria-hidden="true">{{ action.icon }}</mat-icon>
        </div>
        <span class="text-xs font-medium text-text-secondary text-center">{{ action.label }}</span>
      </a>
    }
  </div>
</il-card>
