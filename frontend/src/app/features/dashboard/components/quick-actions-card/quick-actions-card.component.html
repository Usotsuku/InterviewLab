<il-card title="Quick Actions">
  <div class="grid grid-cols-2 gap-3">
    @for (action of actions; track action.route) {
      <a
        [routerLink]="action.route"
        class="flex flex-col items-center gap-2 p-4 rounded-xl border border-neutral-200 hover:border-neutral-300 hover:bg-neutral-50 transition-colors duration-150 no-underline group"
      >
        <div class="flex items-center justify-center w-10 h-10 rounded-lg transition-transform duration-150 group-hover:scale-105" [ngClass]="action.color">
          <mat-icon class="text-white text-lg w-5 h-5" aria-hidden="true">{{ action.icon }}</mat-icon>
        </div>
        <span class="text-xs font-medium text-neutral-600 text-center">{{ action.label }}</span>
      </a>
    }
  </div>
</il-card>
