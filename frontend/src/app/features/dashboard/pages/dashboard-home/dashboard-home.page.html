<section class="space-y-6">
  @if (loading()) {
    <div class="flex items-center justify-center py-20">
      <il-spinner label="Loading dashboard..." />
    </div>
  } @else if (error()) {
    <div class="text-center py-12">
      <p class="text-sm text-danger-500">{{ error() }}</p>
    </div>
  } @else {
    @if (profileView.isEmpty()) {
      <il-card title="Get started">
        <il-empty-state
          icon="rocket_launch"
          title="Welcome to InterviewLab"
          description="Complete your candidate profile to unlock AI-generated interviews. Add your experience and skills, or upload your CV to begin."
          actionLabel="Build Profile"
          secondaryActionLabel="Upload CV"
          (actionClick)="router.navigate(['/profile/edit'])"
          (secondaryActionClick)="router.navigate(['/profile'])"
        />
      </il-card>
    }

    <il-dashboard-hero
      [userName]="userName()?.name ?? 'Candidate'"
      [totalInterviews]="totalInterviews()"
      [completionRate]="completionRate()"
    />

    <il-statistics-cards [stats]="stats()" />

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 items-stretch">
      <div class="lg:col-span-2">
        <il-recent-interviews-card
          [interviews]="recentInterviews()"
          (viewAllClick)="onViewAll()"
        />
      </div>
      <div>
        <il-progress-overview-card
          [averageScore]="averageScore()"
          [averageConfidence]="averageConfidence()"
          [completionRate]="completionRate()"
          [interviewsThisWeek]="interviewsThisWeek()"
          [interviewsThisMonth]="interviewsThisMonth()"
        />
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-stretch">
      <il-skill-breakdown-card
        [communicationScore]="store.averageCommunication()"
        [technicalScore]="store.averageTechnical()"
        [confidenceScore]="store.averageConfidence()"
      />
      <il-quick-actions-card />
    </div>
  }
</section>
