<il-card title="Skill Overview">
  @if (data().length >= 3) {
    <div class="flex justify-center">
      <svg
        [attr.viewBox]="'0 0 ' + size + ' ' + size"
        class="w-full max-w-[240px]"
        role="img"
        aria-label="Skill radar chart"
      >
        @for (poly of backgroundPolygons(); track $index) {
          <polygon
            [attr.points]="poly"
            fill="none"
            stroke="var(--il-border)"
            stroke-width="0.5"
          />
        }

        @for (line of axisLines(); track $index) {
          <line
            [attr.x1]="line.x1"
            [attr.y1]="line.y1"
            [attr.x2]="line.x2"
            [attr.y2]="line.y2"
            stroke="var(--il-border)"
            stroke-width="0.5"
          />
        }

        <polygon
          [attr.points]="polygonPoints()"
          fill="var(--il-primary-500)"
          fill-opacity="0.15"
          stroke="var(--il-primary-500)"
          stroke-width="1.5"
        />

        @for (label of labelPositions(); track $index) {
          <text
            [attr.x]="label.x"
            [attr.y]="label.y"
            text-anchor="middle"
            dominant-baseline="middle"
            class="il-radar-label"
          >
            {{ label.label }}
          </text>
          <text
            [attr.x]="label.x"
            [attr.y]="label.y + 12"
            text-anchor="middle"
            dominant-baseline="middle"
            class="il-radar-value"
          >
            {{ label.value > 0 ? label.value.toFixed(0) + '%' : '—' }}
          </text>
        }
      </svg>
    </div>
  } @else {
    <div class="h-48 flex items-center justify-center text-sm text-text-muted">
      Not enough data to display skill radar
    </div>
  }
</il-card>
