<section class="space-y-8">
  @if (loading()) {
    <div class="flex items-center justify-center py-24">
      <il-spinner label="Loading analytics..." />
    </div>
  } @else if (error()) {
    <div class="text-center py-16">
      <p class="text-sm text-danger-500">{{ error() }}</p>
    </div>
  } @else if (completedCount() === 0) {
    <il-empty-state
      icon="bar_chart"
      title="No analytics yet"
      description="Complete your first interview to see performance analytics and improvement insights."
      actionLabel="Start Interview"
    />
  } @else {
    <div class="il-fade-in-up">
      <il-analytics-hero
        [userName]="userName()?.name ?? 'Candidate'"
        [totalInterviews]="store.totalInterviews()"
        [completedCount]="store.completedCount()"
        [averageScore]="store.averageScore()"
      />
    </div>

    <div class="il-fade-in-up grid grid-cols-2 lg:grid-cols-4 gap-5">
      <il-metric-trend-card
        title="Overall Score"
        icon="star"
        [trendData]="store.scoreTrend()"
        [currentValue]="store.averageScore()"
        unit="%"
        color="var(--il-primary-500)"
        [showChange]="false"
      />
      <il-metric-trend-card
        title="Confidence"
        icon="psychology"
        [trendData]="store.confidenceTrend()"
        [currentValue]="store.averageConfidence()"
        unit="%"
        color="var(--il-warning-500)"
        [showChange]="false"
      />
      <il-metric-trend-card
        title="Speaking Pace"
        icon="record_voice_over"
        [trendData]="store.wpmTrend()"
        [currentValue]="store.averageWordsPerMinute()"
        unit="wpm"
        color="var(--il-info-500)"
        [showChange]="false"
      />
      <il-metric-trend-card
        title="Vocabulary"
        icon="menu_book"
        [trendData]="store.vocabTrend()"
        [currentValue]="store.averageVocabularyRichness() * 100"
        unit="%"
        color="var(--il-success-500)"
        [showChange]="false"
      />
    </div>

    <div class="il-fade-in-up grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2">
        <il-score-trends-card
          [scoreTrend]="store.scoreTrend()"
          [confidenceTrend]="store.confidenceTrend()"
          [communicationTrend]="store.communicationTrend()"
          [technicalTrend]="store.technicalTrend()"
          [averageScore]="store.averageScore()"
          [averageConfidence]="store.averageConfidence()"
          [averageCommunication]="store.averageCommunication()"
          [averageTechnical]="store.averageTechnical()"
        />
      </div>
      <div>
        <il-skill-radar-card
          [data]="store.skillRadarData()"
        />
      </div>
    </div>

    <div class="il-fade-in-up grid grid-cols-1 lg:grid-cols-2 gap-8">
      <il-speaking-metrics-card
        [averageWordsPerMinute]="store.averageWordsPerMinute()"
        [averageVocabularyRichness]="store.averageVocabularyRichness()"
        [averageKeywordCoverage]="store.averageKeywordCoverage()"
        [averageFillerCount]="store.averageFillerCount()"
        [averageRepetitionScore]="store.averageRepetitionScore()"
        [averagePauseCount]="store.averagePauseCount()"
        [wpmTrend]="store.wpmTrend()"
        [vocabTrend]="store.vocabTrend()"
        [fillerTrend]="store.fillerTrend()"
      />
      <il-practice-summary-card
        [totalInterviews]="store.totalInterviews()"
        [completedCount]="store.completedCount()"
        [totalPracticeMinutes]="store.totalPracticeMinutes()"
        [averageDuration]="store.averageDuration()"
        [interviewsPerWeek]="store.interviewsPerWeek()"
        [strongestCategory]="store.strongestCategory()"
        [weakestCategory]="store.weakestCategory()"
      />
    </div>

    <div class="il-fade-in-up">
      <il-improvement-insights-card
        [insights]="store.improvements()"
      />
    </div>
  }
</section>
