<div class="il-auth-card il-fade-in-up">
  <div class="mb-6">
    <h2 class="text-[20px] font-bold text-text mb-1 tracking-tight">Welcome back</h2>
    <p class="text-[13px] text-text-secondary">Sign in to continue your interview preparation</p>
  </div>

  @if (errorMessage) {
    <div class="il-alert il-alert--error mb-4" role="alert">
      <mat-icon class="text-base w-4 h-4 shrink-0" aria-hidden="true">error_outline</mat-icon>
      <span>{{ errorMessage }}</span>
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-3" novalidate>
    <div class="il-auth-input" [class.il-auth-input--error]="email.invalid && email.touched">
      <div class="il-auth-input__field">
        <div class="il-auth-input__icon">
          <mat-icon aria-hidden="true">mail_outline</mat-icon>
        </div>
        <input
          class="il-auth-input__input"
          type="email"
          formControlName="email"
          autocomplete="email"
          placeholder="Email address"
        />
      </div>
    </div>

    <il-form-error
      [show]="email.invalid && email.touched"
      [message]="email.hasError('required') ? 'Email is required' : 'Enter a valid email address'"
    />

    <div class="il-auth-input" [class.il-auth-input--error]="password.invalid && password.touched">
      <div class="il-auth-input__field">
        <div class="il-auth-input__icon">
          <mat-icon aria-hidden="true">lock_outline</mat-icon>
        </div>
        <input
          class="il-auth-input__input"
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Password"
        />
        <div class="il-auth-input__suffix">
          <button
            class="il-auth-input__eye-btn"
            type="button"
            (click)="hidePassword = !hidePassword"
            [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
          >
            <mat-icon aria-hidden="true">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </div>
      </div>
    </div>

    <il-form-error
      [show]="password.invalid && password.touched"
      [message]="password.hasError('required') ? 'Password is required' : 'Password must be at least 8 characters'"
    />

    <div class="mt-1">
      <il-button
        type="submit"
        variant="primary"
        size="lg"
        class="w-full il-btn--auth"
        [loading]="authStore.loading()"
        [disabled]="authStore.loading()"
      >Sign In</il-button>
    </div>
  </form>

  <div class="mt-4 text-center">
    <a routerLink="/auth/forgot-password" class="text-[13px] text-text-muted hover:text-primary-400 transition-colors font-medium">
      Forgot your password?
    </a>
  </div>

  <div class="mt-5 pt-4 border-t border-border text-center">
    <span class="text-[13px] text-text-secondary">
      Don't have an account?
      <a routerLink="/auth/register" class="text-primary-400 hover:text-primary-300 font-semibold transition-colors">
        Create one
      </a>
    </span>
  </div>
</div>
