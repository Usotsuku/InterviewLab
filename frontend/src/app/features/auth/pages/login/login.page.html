<div class="il-auth-card il-fade-in-up">
  <div class="mb-7">
    <h2 class="text-xl font-bold text-text mb-1 tracking-tight">Welcome back</h2>
    <p class="text-sm text-text-secondary">Sign in to continue your interview preparation</p>
  </div>

  @if (errorMessage) {
    <div class="il-alert il-alert--error mb-5" role="alert">
      <mat-icon class="text-base w-4 h-4 shrink-0" aria-hidden="true">error_outline</mat-icon>
      <span>{{ errorMessage }}</span>
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="onSubmit()" class="flex flex-col gap-4" novalidate>
    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Email</mat-label>
      <input
        matInput
        type="email"
        formControlName="email"
        autocomplete="email"
        placeholder="you@example.com"
      />
      <mat-icon matPrefix class="text-text-muted" aria-hidden="true">mail_outline</mat-icon>
    </mat-form-field>

    <il-form-error
      [show]="email.invalid && email.touched"
      [message]="email.hasError('required') ? 'Email is required' : 'Enter a valid email address'"
    />

    <mat-form-field appearance="outline" class="w-full">
      <mat-label>Password</mat-label>
      <input
        matInput
        [type]="hidePassword ? 'password' : 'text'"
        formControlName="password"
        autocomplete="current-password"
        placeholder="Enter your password"
      />
      <mat-icon matPrefix class="text-text-muted" aria-hidden="true">lock_outline</mat-icon>
      <button
        mat-icon-button
        matSuffix
        type="button"
        (click)="hidePassword = !hidePassword"
        [attr.aria-label]="hidePassword ? 'Show password' : 'Hide password'"
      >
        <mat-icon aria-hidden="true">{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
      </button>
    </mat-form-field>

    <il-form-error
      [show]="password.invalid && password.touched"
      [message]="password.hasError('required') ? 'Password is required' : 'Password must be at least 8 characters'"
    />

    <il-button
      type="submit"
      variant="primary"
      size="lg"
      class="w-full mt-1"
      [loading]="authStore.loading()"
      [disabled]="authStore.loading()"
    >Sign In</il-button>
  </form>

  <div class="mt-5 text-center">
    <a routerLink="/auth/forgot-password" class="text-sm text-primary-400 hover:text-primary-300 transition-colors font-medium">
      Forgot your password?
    </a>
  </div>

  <div class="mt-6 pt-5 border-t border-border text-center">
    <span class="text-sm text-text-secondary">
      Don't have an account?
      <a routerLink="/auth/register" class="text-primary-400 hover:text-primary-300 font-semibold transition-colors">
        Create one
      </a>
    </span>
  </div>
</div>
