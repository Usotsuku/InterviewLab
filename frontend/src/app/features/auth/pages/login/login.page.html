<div class="il-card">
  <h2 class="text-xl mb-1.5">Welcome back</h2>
  <p class="text-sm text-neutral-400 mb-6">Sign in to continue your interview preparation</p>

  @if (authStore.error()) {
    <div class="bg-danger-50 text-danger-400 px-3.5 py-2.5 rounded-sm text-sm mb-4">{{ authStore.error() }}</div>
  }

  <form class="flex flex-col gap-1" (ngSubmit)="onLogin()">
    <mat-form-field appearance="outline">
      <mat-label>Email</mat-label>
      <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
    </mat-form-field>

    <mat-form-field appearance="outline">
      <mat-label>Password</mat-label>
      <input matInput type="password" [(ngModel)]="password" name="password" required autocomplete="current-password" />
    </mat-form-field>

    <button
      mat-raised-button
      color="primary"
      type="submit"
      class="w-full h-11 mt-2"
      [disabled]="authStore.loading()"
    >
      @if (authStore.loading()) {
        <mat-progress-spinner diameter="20" mode="indeterminate" />
      } @else {
        Sign In
      }
    </button>
  </form>

  <p class="text-center text-sm mt-5">
    Don't have an account?
    <a routerLink="/auth/register">Create one</a>
  </p>
</div>
