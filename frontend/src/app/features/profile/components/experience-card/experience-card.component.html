<div class="il-card il-radius-xl p-6 il-fade-in-up">
  <div class="flex items-start justify-between gap-3">
    <div class="flex-1 min-w-0">
      <h4 class="text-base font-semibold text-text tracking-tight">{{ entry().position }}</h4>
      <p class="text-sm text-primary-400 font-medium">{{ entry().company }}</p>
      <p class="text-xs text-text-muted mt-1">
        {{ entry().startDate | date:'MMM yyyy' }}
        — {{ entry().endDate ? (entry().endDate | date:'MMM yyyy') : 'Present' }}
      </p>
      @if (entry().description) {
        <p class="text-sm text-text-secondary mt-3 leading-relaxed">{{ entry().description }}</p>
      }
    </div>
    @if (editable()) {
      <button
        mat-icon-button
        type="button"
        class="flex-shrink-0 text-text-muted hover:text-danger-500 transition-colors"
        (click)="removeClicked.emit(index())"
        aria-label="Remove experience entry"
      >
        <mat-icon aria-hidden="true">close</mat-icon>
      </button>
    }
  </div>
</div>
