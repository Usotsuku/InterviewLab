<div class="w-full">
  <label class="block text-sm font-medium text-text mb-2.5">{{ label() }}</label>
  <mat-chip-grid #chipGrid class="min-h-[40px]">
    @for (item of items(); track item) {
      <mat-chip-row
        (removed)="remove(item)"
        class="!bg-primary-50 !text-primary-600 !border-primary-100"
      >
        {{ item }}
        <button matChipRemove [attr.aria-label]="'Remove ' + item">
          <mat-icon class="text-sm" aria-hidden="true">close</mat-icon>
        </button>
      </mat-chip-row>
    }
    <input
      [placeholder]="placeholder()"
      [matChipInputFor]="chipGrid"
      [matChipInputSeparatorKeyCodes]="separatorKeyCodes"
      [matChipInputAddOnBlur]="true"
      (matChipInputTokenEnd)="add($event)"
      [attr.aria-label]="label()"
      class="flex-1 min-w-[120px]"
    />
  </mat-chip-grid>
</div>
