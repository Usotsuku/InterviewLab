<div class="flex items-center gap-3 w-full">
  <span class="text-xs font-semibold text-neutral-400 whitespace-nowrap">{{ progressLabel() }}</span>
  <il-progress [value]="progressPercent()" variant="primary" />
  @if (mode()) {
    <span class="text-xs font-medium text-neutral-500 bg-neutral-100 px-2 py-0.5 rounded whitespace-nowrap">{{ mode() }}</span>
  }
</div>
