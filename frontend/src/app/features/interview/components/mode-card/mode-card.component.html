<div
  [class]="cardClass()"
  role="radio"
  [attr.aria-checked]="selected()"
  [attr.aria-disabled]="disabled()"
  [attr.aria-label]="modeConfig().title + ': ' + modeConfig().description"
  tabindex="0"
  (click)="onSelect()"
  (keydown)="onKeydown($event)"
>
  <div class="flex items-start gap-4">
    <div
      class="w-11 h-11 rounded-xl flex items-center justify-center flex-shrink-0 transition-all duration-200"
      [class]="selected() ? 'bg-primary-500 text-white shadow-md shadow-primary-500/25' : 'bg-surface-2 text-text-muted'"
    >
      <mat-icon class="text-xl" aria-hidden="true">{{ modeConfig().icon }}</mat-icon>
    </div>
    <div class="flex-1 min-w-0">
      <h3 class="text-base font-semibold text-text tracking-tight mb-1">{{ modeConfig().title }}</h3>
      <p class="text-sm text-text-secondary leading-relaxed">{{ modeConfig().description }}</p>
    </div>
    @if (selected()) {
      <mat-icon class="text-primary-500 flex-shrink-0 mt-0.5" aria-hidden="true">check_circle</mat-icon>
    }
  </div>
</div>
