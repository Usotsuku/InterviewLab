<div class="il-card il-fade-in-up p-5">
  <div class="flex items-center gap-2 mb-4">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-warning-50">
      <mat-icon class="text-base text-warning-500" aria-hidden="true">warning</mat-icon>
    </div>
    <h3 class="text-base font-semibold text-text tracking-tight">Areas for Improvement</h3>
  </div>
  @if (weaknesses().length > 0) {
    <ul class="space-y-2.5">
      @for (item of weaknesses(); track item) {
        <li class="flex items-start gap-2.5 text-sm text-text-secondary leading-relaxed">
          <mat-icon class="text-xs w-4 h-4 text-warning-500 mt-0.5 flex-shrink-0" aria-hidden="true">arrow_right</mat-icon>
          {{ item }}
        </li>
      }
    </ul>
  } @else {
    <p class="text-sm text-text-muted italic">No improvement areas identified.</p>
  }
</div>
