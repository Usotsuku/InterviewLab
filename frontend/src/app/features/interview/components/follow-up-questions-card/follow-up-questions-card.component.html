<div class="il-card p-5">
  <div class="flex items-center gap-2 mb-4">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-neutral-100">
      <mat-icon class="text-base text-neutral-500" aria-hidden="true">help_outline</mat-icon>
    </div>
    <h3 class="text-base font-semibold text-neutral-800">Follow-Up Questions</h3>
  </div>
  @if (questions().length > 0) {
    <ol class="space-y-2.5 list-decimal list-inside">
      @for (item of questions(); track item) {
        <li class="text-sm text-neutral-600 leading-relaxed pl-1">{{ item }}</li>
      }
    </ol>
  } @else {
    <p class="text-sm text-neutral-300 italic">No follow-up questions suggested.</p>
  }
</div>
