<div class="il-card il-fade-in-up p-5">
  <div class="flex items-center gap-2 mb-4">
    <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-surface-2">
      <mat-icon class="text-base text-text-muted" aria-hidden="true">help_outline</mat-icon>
    </div>
    <h3 class="text-base font-semibold text-text tracking-tight">Follow-Up Questions</h3>
  </div>
  @if (questions().length > 0) {
    <ol class="space-y-2.5 list-decimal list-inside">
      @for (item of questions(); track item) {
        <li class="text-sm text-text-secondary leading-relaxed pl-1">{{ item }}</li>
      }
    </ol>
  } @else {
    <p class="text-sm text-text-muted italic">No follow-up questions suggested.</p>
  }
</div>
