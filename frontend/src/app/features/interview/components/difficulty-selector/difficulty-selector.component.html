<div class="flex flex-col gap-3">
  <div class="flex gap-2" role="radiogroup" aria-label="Interview difficulty">
    @for (option of options; track option.value) {
      <button
        [class]="buttonClass(option.value)"
        role="radio"
        [attr.aria-checked]="selected() === option.value"
        [attr.aria-disabled]="disabled()"
        [attr.aria-label]="option.label + ' difficulty'"
        [disabled]="disabled()"
        (click)="onSelect(option.value)"
        (keydown)="onKeydown($event, option.value)"
      >
        {{ option.label }}
      </button>
    }
  </div>
  <p class="text-sm text-neutral-400">{{ description() }}</p>
</div>
