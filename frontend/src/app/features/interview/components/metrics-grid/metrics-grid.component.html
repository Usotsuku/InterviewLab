@if (hasAnyScore()) {
  <div class="grid grid-cols-2 gap-4 max-lg:grid-cols-1">
    @for (metric of metrics(); track metric.label) {
      <div class="il-card p-4">
        <div class="flex items-center gap-3 mb-3">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-neutral-100">
            <mat-icon class="text-base text-neutral-500" aria-hidden="true">{{ metric.icon }}</mat-icon>
          </div>
          <span class="text-sm font-medium text-neutral-600">{{ metric.label }}</span>
        </div>
        <div class="flex items-end gap-2 mb-2">
          <span class="text-2xl font-bold text-neutral-800">{{ formatValue(metric.value) }}</span>
          @if (metric.value !== null) {
            <span class="text-xs text-neutral-400 mb-1">/ 100</span>
          }
        </div>
        @if (metric.value !== null) {
          <il-progress [value]="metric.value" [variant]="metric.variant" />
        }
      </div>
    }
  </div>
}
