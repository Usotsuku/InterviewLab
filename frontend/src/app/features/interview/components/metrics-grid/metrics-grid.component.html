@if (hasAnyScore()) {
  <div class="grid grid-cols-2 gap-4 max-lg:grid-cols-1">
    @for (metric of metrics(); track metric.label) {
      <div class="il-card p-5">
        <div class="flex items-center gap-3 mb-4">
          <div class="w-9 h-9 rounded-xl flex items-center justify-center bg-surface-2">
            <mat-icon class="text-base text-text-muted" aria-hidden="true">{{ metric.icon }}</mat-icon>
          </div>
          <span class="text-sm font-medium text-text-secondary">{{ metric.label }}</span>
        </div>
        <div class="flex items-end gap-2 mb-3">
          <span class="text-2xl font-bold text-text tracking-tight">{{ formatValue(metric.value) }}</span>
          @if (metric.value !== null) {
            <span class="text-xs text-text-muted mb-1">/ 100</span>
          }
        </div>
        @if (metric.value !== null) {
          <il-progress [value]="metric.value" [variant]="metric.variant" />
        }
      </div>
    }
  </div>
}
