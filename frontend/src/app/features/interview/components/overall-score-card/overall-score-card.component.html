<div class="il-card p-8 text-center">
  <div class="score-ring-wrapper mx-auto mb-6">
    <svg class="score-ring" viewBox="0 0 120 120" aria-hidden="true">
      <defs>
        <linearGradient id="scoreGradient" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" [style.stop-color]="scoreColor()" />
          <stop offset="100%" [style.stop-color]="scoreColor()" stop-opacity="0.6" />
        </linearGradient>
      </defs>
      <circle
        class="score-ring-bg"
        cx="60"
        cy="60"
        r="54"
        fill="none"
        stroke-width="8"
      />
      <circle
        class="score-ring-fill"
        cx="60"
        cy="60"
        r="54"
        fill="none"
        stroke-width="8"
        stroke-linecap="round"
        stroke="url(#scoreGradient)"
        [attr.stroke-dasharray]="circumference"
        [attr.stroke-dashoffset]="strokeDashoffset()"
      />
    </svg>
    <div class="score-ring-label">
      <span class="text-3xl font-bold text-text tracking-tight">{{ scoreLabel() }}</span>
      @if (grade()) {
        <span class="text-sm font-medium text-text-secondary">Grade {{ grade() }}</span>
      }
    </div>
  </div>
  @if (summary()) {
    <p class="text-sm text-text-secondary max-w-xs mx-auto leading-relaxed">{{ summary() }}</p>
  }
  @if (!hasScore()) {
    <p class="text-sm text-text-muted italic">Score pending</p>
  }
</div>
