<div class="flex flex-col gap-4">
  <div class="flex gap-2.5" role="radiogroup" aria-label="Number of questions">
    @for (count of options; track count) {
      <button
        [class]="buttonClass(count)"
        role="radio"
        [attr.aria-checked]="value() === count"
        [attr.aria-disabled]="disabled()"
        [attr.aria-label]="count + ' questions'"
        [disabled]="disabled()"
        (click)="onSelect(count)"
        (keydown)="onKeydown($event, count)"
      >
        {{ count }}
      </button>
    }
  </div>

  <div class="flex flex-col gap-2.5">
    <input
      type="range"
      [min]="5"
      [max]="20"
      [step]="1"
      [value]="value()"
      [disabled]="disabled()"
      class="w-full h-1.5 bg-surface-2 rounded-full appearance-none cursor-pointer accent-primary-500 disabled:opacity-50 disabled:cursor-not-allowed"
      aria-label="Question count slider"
      (input)="onSliderInput($event)"
    />
    <div class="flex justify-between text-xs text-text-muted">
      <span>5</span>
      <span>20</span>
    </div>
  </div>

  <p class="text-sm text-text-secondary leading-relaxed">{{ description() }}</p>
</div>
